<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>看见你的声音 - 45个让心靠近的对话</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--coral:#FF6B6B;--teal:#4ECDC4;--yellow:#FFE66D;--purple:#A8D8EA;--peach:#FFD3B6;--pink:#FFAAA5;--bg:#FFF8F0;--text:#2C3E50;--text-light:#7F8C8D;--shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px}
html,body{height:100%;overflow:hidden}
body{font-family:'ZCOOL KuaiLe','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.screen.active{opacity:1;pointer-events:auto}
.screen.no-pad{padding:0}
#welcome{background:linear-gradient(135deg,#FFF8F0,#FFE8D6,#FFD3B6)}
.welcome-inner{text-align:center;max-width:380px;padding:0 16px}
.logo{font-size:64px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome-inner h1{font-size:28px;color:var(--coral);margin-bottom:4px}
.welcome-inner h2{font-size:15px;color:var(--text-light);font-weight:normal;margin-bottom:28px}
.how-to{background:rgba(255,255,255,.7);border-radius:var(--radius);padding:16px;text-align:left;margin-bottom:28px;font-size:13px;line-height:2}
.how-to p{font-size:14px;font-weight:bold;margin-bottom:6px;color:var(--coral)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 40px;border:none;border-radius:50px;font-size:18px;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(0,0,0,.12)}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--coral);color:#fff}
.btn-ghost{background:transparent;color:var(--coral);border:2px solid var(--coral);padding:12px 36px;font-size:15px}
.btn-small{padding:10px 24px;font-size:14px}
.btn-teal{background:var(--teal);color:#fff}
#deck{background:var(--bg)}
.deck-header{width:100%;max-width:420px;padding:16px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.progress-bar{flex:1;min-width:120px;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .5s}
.progress-text{font-size:13px;color:var(--text-light);white-space:nowrap}
.cat-pills{width:100%;max-width:420px;display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:12px;border:none;cursor:pointer;transition:all .2s;font-family:inherit;background:#f0f0f0;color:var(--text-light)}
.cat-pill.active{background:var(--coral);color:#fff}
.cat-pill.done{background:var(--teal);color:#fff}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:420px;padding:16px}
.card-stack{position:relative;width:100%;max-width:300px;aspect-ratio:3/4}
.mini-card{position:absolute;width:100%;height:100%;border-radius:var(--radius);background:var(--card-bg);box-shadow:var(--shadow)}
.mini-card:nth-child(1){transform:translate(8px,8px) rotate(2deg);background:#fff5f5}
.mini-card:nth-child(2){transform:translate(4px,4px) rotate(-1deg);background:#f5f0ff}
.main-card{position:absolute;width:100%;height:100%;border-radius:var(--radius);background:var(--card-bg);box-shadow:0 8px 30px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s}
.main-card:active{transform:scale(.97)}
.main-card .card-emoji{font-size:60px;margin-bottom:12px}
.main-card .card-text{font-size:18px;color:var(--coral)}
.main-card .card-hint{font-size:12px;color:var(--text-light);margin-top:16px}
.deck-actions{padding:16px;display:flex;gap:12px}
.deck-footer{padding:8px 16px 16px;font-size:12px;color:var(--text-light);text-align:center}
.flip-container{perspective:1000px;width:100%;max-width:300px;aspect-ratio:3/4}
.flip-inner{width:100%;height:100%;position:relative;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.flip-front{background:linear-gradient(135deg,var(--coral),var(--pink));color:#fff;box-shadow:0 8px 30px rgba(255,107,107,.3)}
.flip-front .card-emoji{font-size:60px;margin-bottom:12px}
.flip-front .card-text{font-size:18px}
.flip-back{background:var(--card-bg);transform:rotateY(180deg);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.flip-back .q-cat{font-size:11px;color:var(--teal);margin-bottom:8px}
.flip-back .q-num{font-size:13px;color:var(--text-light);margin-bottom:12px}
.flip-back .q-text{font-size:20px;text-align:center;line-height:1.6}
#answer{background:var(--bg)}
.answer-scroll{width:100%;max-width:480px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.q-display{background:var(--card-bg);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center}
.q-display .q-cat-tag{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;background:#C5E8F2;color:#5B8FA8;margin-bottom:8px}
.q-display .q-number{font-size:13px;color:var(--text-light);margin-bottom:6px}
.q-display .q-question{font-size:18px;line-height:1.6}
.role-label{font-size:15px;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.role-child{color:var(--coral)}
.role-parent{color:var(--teal)}
.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{width:100%;padding:14px 16px;border:2px solid #eee;border-radius:12px;background:var(--card-bg);font-size:14px;font-family:inherit;text-align:left;cursor:pointer;transition:all .2s;line-height:1.5;color:var(--text)}
.option-btn:active{transform:scale(.98)}
.option-btn:hover{border-color:var(--peach);background:#FFF5F0}
.option-btn.selected-child{border-color:var(--coral);background:#FFF0F0;font-weight:bold}
.option-btn.selected-parent{border-color:var(--teal);background:#F0FFF0;font-weight:bold}
.option-btn:disabled{cursor:default;opacity:.85}
.skip-btn{display:block;margin:16px auto 0;padding:8px 20px;border:none;background:transparent;color:var(--text-light);font-size:13px;font-family:inherit;cursor:pointer;text-decoration:underline}
.parent-divider{margin:20px 0 4px;padding:12px 16px;background:#F0FFF0;border-radius:12px;text-align:center;font-size:14px;color:var(--teal)}
#reveal{background:var(--bg)}
.reveal-scroll{width:100%;max-width:480px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:100px}
.reveal-q{background:var(--card-bg);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center}
.reveal-q .q-text{font-size:17px;line-height:1.6}
.reveal-section{background:var(--card-bg);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.reveal-section.child-s{border-left:4px solid var(--coral)}
.reveal-section.parent-s{border-left:4px solid var(--teal)}
.reveal-section.relation-s{border-left:4px solid var(--yellow)}
.reveal-section h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.reveal-answer{display:inline-block;padding:6px 14px;border-radius:20px;font-size:14px;margin-bottom:12px}
.child-s .reveal-answer{background:#FFF0F0;color:var(--coral)}
.parent-s .reveal-answer{background:#F0FFF0;color:#2EA88A}
.reveal-analysis{font-size:14px;line-height:1.8;color:#555;padding:12px;background:#FAFAFA;border-radius:10px}
.reveal-same{padding:14px;background:#E8F8F5;border-radius:var(--radius);margin-bottom:12px;font-size:14px;line-height:1.7;text-align:center;color:#1A7A6D}
.reveal-diff{padding:14px;background:#FFF9E6;border-radius:var(--radius);margin-bottom:12px;font-size:14px;line-height:1.7;text-align:center;color:#8B7000}
.reveal-actions{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(255,248,240,.95);backdrop-filter:blur(10px);display:flex;gap:12px;justify-content:center;border-top:1px solid #eee}
#progress{background:var(--bg)}
.progress-scroll{width:100%;max-width:480px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.progress-scroll h2{font-size:20px;text-align:center;margin-bottom:16px;color:var(--coral)}
.cat-group{margin-bottom:16px}
.cat-group-title{font-size:14px;color:var(--teal);margin-bottom:8px;padding-left:4px}
.cat-group-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.q-dot{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.q-dot.pending{background:#f5f5f5;color:#bbb}
.q-dot.completed{background:var(--teal-light);color:#fff}
.progress-footer{padding:16px;text-align:center}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall 2.5s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mt-12{margin-top:12px}
@media(max-width:380px){.welcome-inner h1{font-size:24px}.main-card .card-emoji{font-size:48px}.flip-back .q-text{font-size:17px}}
</style>
</head>
<body>
<div id="welcome" class="screen active">
<div class="welcome-inner">
<div class="logo">🌈</div>
<h1>看见你的声音</h1>
<h2>45个让心靠近的亲子对话</h2>
<div class="how-to">
<p>🎮 怎么玩？</p>
1. 随机抽取一张问题卡片<br>
2. 孩子先选自己真实的答案<br>
3. 家长也选自己真实的答案<br>
4. 分别看两个人的心理解读<br>
5. 聊聊彼此的差异和共鸣 💕
</div>
<button class="btn btn-primary" onclick="startGame()">开始游戏 ✨</button>
<div class="mt-12"><button class="btn btn-ghost btn-small" onclick="showProgress()">查看进度 📊</button></div>
</div>
</div>

<div id="deck" class="screen">
<div class="deck-header"><div class="progress-bar"><div class="progress-fill" id="deckProgress"></div></div><div class="progress-text" id="deckProgressText">0/45</div></div>
<div class="cat-pills" id="catPills"></div>
<div class="card-area">
<div class="card-stack" id="cardStack">
<div class="mini-card"></div><div class="mini-card"></div>
<div class="main-card" onclick="drawCard()"><div class="card-emoji">🎴</div><div class="card-text">点我抽卡</div><div class="card-hint">随机抽取一个问题</div></div>
</div>
<div class="flip-container" id="flipContainer" style="display:none">
<div class="flip-inner" id="flipInner">
<div class="flip-front"><div class="card-emoji">✨</div><div class="card-text">翻开看看</div></div>
<div class="flip-back" id="flipBack"><div class="q-cat" id="flipCat"></div><div class="q-num" id="flipNum"></div><div class="q-text" id="flipText"></div></div>
</div>
</div>
</div>
<div class="deck-actions"><button class="btn btn-ghost btn-small" onclick="showWelcome()">🏠 首页</button><button class="btn btn-ghost btn-small" onclick="showProgress()">📊 进度</button></div>
<div class="deck-footer" id="deckFooter">还有 45 个问题等你探索~</div>
</div>

<div id="answer" class="screen no-pad">
<div class="answer-scroll" id="answerScroll">
<div class="q-display" id="answerQDisplay"></div>
<div class="role-label role-child">🧒 孩子，选一个你最真实的答案：</div>
<div class="options-list" id="childOptions"></div>
<div id="parentSection" style="display:none">
<div class="parent-divider">👇 现在换家长来，选你自己真实的答案（不是猜孩子的哦）</div>
<div class="role-label role-parent">👨‍👩‍👧 家长，如果是你，你选哪个？</div>
<div class="options-list" id="parentOptions"></div>
</div>
<button class="skip-btn" onclick="skipQuestion()">跳过这题 ⏭️</button>
</div>
</div>

<div id="reveal" class="screen no-pad">
<div class="reveal-scroll" id="revealScroll"></div>
<div class="reveal-actions"><button class="btn btn-ghost btn-small" onclick="backToDeck()">🎴 继续抽卡</button><button class="btn btn-primary btn-small" onclick="showProgress()">📊 查看进度</button></div>
</div>

<div id="progress" class="screen no-pad">
<div class="progress-scroll" id="progressScroll"></div>
<div style="padding:16px;display:flex;gap:12px;justify-content:center"><button class="btn btn-ghost btn-small" onclick="showWelcome()">🏠 首页</button><button class="btn btn-primary btn-small" onclick="showDeck()">🎴 继续游戏</button></div>
</div>

<script>
const categories=[
{id:1,name:"想象与自我投射",range:"1-9",emoji:"🦋"},
{id:2,name:"自我认知与身份建构",range:"10-15",emoji:"🪞"},
{id:3,name:"情绪觉察与调节",range:"16-25",emoji:"💛"},
{id:4,name:"自我价值与内在对话",range:"26-27",emoji:"⭐"},
{id:5,name:"社交关系与友谊",range:"28-36",emoji:"🤝"},
{id:6,name:"价值观与资源观",range:"37-39",emoji:"💎"},
{id:7,name:"家庭关系与依恋",range:"40-45",emoji:"🏡"}
];

// a=孩子分析, pa=家长分析
const questions=[
{id:1,cat:1,q:"如果可以变成一种动物，你希望是什么动物？",options:[
{t:"猫/狗等宠物类",a:"投射对「被爱、被关注」的渴望。宠物是被照顾的角色，说明孩子当前可能正处于渴望被呵护的心理阶段。",pa:"选择宠物类说明你内心渴望被照顾和被温柔对待。作为家长，你可能承担了太多「照顾者」的角色，忘了自己也需要被关怀。这是提醒你给自己一些被爱的空间。"},
{t:"狮子/老虎/龙等力量型",a:"补偿性幻想——现实中可能感到弱小或被控制，通过选择强大动物来补偿无力感，渴望掌控和自主。",pa:"选择力量型动物说明你当前可能在生活或工作中感到某种无力感，渴望更多的掌控力。也可能反映你对「强大」的定义偏向于力量和支配。"},
{t:"鸟/鹰/蝴蝶等会飞的",a:"典型的「自由渴望」投射。可能感受到过多的约束，飞翔代表对自主空间和逃离限制的向往。",pa:"你内心渴望自由和突破。可能在日常生活中感到被责任和角色束缚，渴望一段不被定义、可以自由飞翔的时光。"},
{t:"海豚/鱼等水生动物",a:"水象征情感和潜意识。选择水生动物反映情感丰富、对内在世界敏感，或正处于某种情绪流动期。",pa:"你是一个情感丰富的人，内心世界像水一样流动。但也可能说明你有时会被情绪淹没，需要找到水面之上的呼吸空间。"},
{t:"兔子/仓鼠等小动物",a:"自我形象偏温和、不具攻击性，性格内敛或在社交中倾向低调，表达对「被保护」角色的认同。",pa:"你认同温和、低调的位置，不喜欢冲突和对抗。这是温柔的力量，但也需要确认：你是否有时因为害怕冲突而压抑了自己的真实需求？"},
{t:"说不出来/奇怪的动物",a:"自我概念尚未清晰，或在试探边界：我可以不按规则回答吗？高创造力表现。",pa:"面对开放性问题你有些不知所措，说明你习惯了有「正确答案」的思维模式。允许自己不确定，也是一种能力。"}
]},
{id:2,cat:1,q:"如果可以实现三个愿望，你想实现什么？",options:[
{t:"玩具、游戏机等物质类",a:"反映当前发展阶段的具体需求，用具体物品表达满足感，不一定是物质主义，而是具象化的快乐。",pa:"你的愿望停留在物质层面，可能说明日常生活中精神层面的满足感不够充足。也可以反思：你的快乐来源是否过于单一？"},
{t:"家庭类（不吵架、全家旅行）",a:"核心依恋需求的直接表达。孩子在用愿望说出日常中缺失的部分，如果提到「不吵架」，是重要的家庭关系信号。",pa:"家庭关系是你情感世界的重心。你的安全感深深绑定在家庭和谐上。这个答案也值得问问自己：我在家庭中创造了多少真正平静的时刻？"},
{t:"超能力（飞、隐身等）",a:"掌控感的补偿性幻想。现实中可能感到被安排、被限制较多，超能力代表「我可以自己决定」的深层需求。",pa:"你渴望超越现实的限制。可能在工作或生活中感到太多「做不到」的时刻，内心需要一个出口来释放这种被压制的能量。"},
{t:"利他类（世界和平、所有人开心）",a:"可能反映高共情能力，也可能是「讨好型」倾向——习惯性把他人需求放在自己前面。",pa:"你把世界的重量放在自己肩上。这是一种善良，但也要警惕：你是否经常忽略自己的需求？照顾好自己不是自私。"},
{t:"学业类（考100分、不用写作业）",a:"学业压力已内化为核心焦虑源。学习占据了愿望清单，说明自我价值感已和成绩过度绑定。",pa:"你的愿望围绕着成就和表现。这反映出你对「做好」的执念——也许你需要允许自己偶尔「不完美」，甚至「什么都不做」。"},
{t:"想不到/不知道",a:"可能需求长期被忽视或被否定，也可能是防御——害怕说出真实愿望后被嘲笑或拒绝。",pa:"面对「你想要什么」这个问题你答不上来。这说明你可能太久没有关注过自己真正想要什么了。重新和自己的欲望对话。"}
]},
{id:3,cat:1,q:"你最想获得什么超能力？",options:[
{t:"飞行",a:"最经典的自由象征。反映对自主空间的渴望，或当前生活中感到被「困住」。",pa:"你渴望从当前的束缚中解脱。也许是某个角色、某段关系、或某种生活节奏让你喘不过气。"},
{t:"隐身",a:"「存在但不被审视」的需求。想观察而不被评判（社交焦虑），或想做不被允许的事（压抑的反抗欲）。",pa:"你想要「被看见但被审视」之间的安全地带。你可能太在意别人的眼光了，隐身是你给自己找的安全出口。"},
{t:"读心术",a:"对他人内心的强烈好奇，可能暗示人际中缺乏安全感——「我不确定别人是否真的喜欢我」。",pa:"你对他人的想法有很强的掌控欲。这可能源于焦虑——不确定感让你不安。试着接受：有些想法不需要知道。"},
{t:"时间暂停/倒流",a:"对过去有遗憾或创伤体验，想要修正。也可能反映当前压力过大，希望一切暂停。",pa:"你心里有一件想改变的事，或者你现在太累了想按下暂停键。无论是遗憾还是疲惫，都需要被正视。"},
{t:"力大无穷/无敌",a:"补偿性力量幻想，常见于在同伴中感到弱势或被欺负的孩子。",pa:"你在现实中感到某种无力——可能是职场的、家庭的、或社会的。内心渴望一种绝对的力量来改变现状。"},
{t:"变身/瞬间移动",a:"身份探索或逃离当前情境的渴望。在不同场景中有强烈角色切换感。",pa:"你渴望「变成另一个人」或「去另一个地方」。这不是逃避，而是你的内心在寻找更适合自己的存在方式。"}
]},
{id:4,cat:1,q:"如果拥有闪电的速度，你想加速做什么事情？",options:[
{t:"快速完成作业/学习",a:"学业任务被体验为「不得不做的苦差」，渴望摆脱义务而非享受过程。内在学习动机不足。",pa:"你把「必须做的事」看作障碍，想尽快跳过。反思：你的生活中有多少事情是被迫而非享受的？"},
{t:"赶去玩/见某个人",a:"目的地代表真正在意的事物。那个「目的地」指向情感重心。",pa:"你心里有一个很清楚的方向——那个让你想加速赶去的人或地方，就是你真正在意的东西。它值得你认真对待。"},
{t:"什么也不做/慢慢来",a:"非常值得关注。用速度来做「慢」的事，反映深层疲惫或对「被催促」的反向抵抗：我不想再快了。",pa:"你的内心在呐喊「慢一点」。这可能说明你长期处于高速运转中，身体和心灵都在渴望休息和留白。"},
{t:"帮助别人（送外卖、救人）",a:"助人倾向投射。需区分是出于真实利他心还是「好孩子」角色扮演。",pa:"你的第一反应是用能力服务他人。这是一种美好的品质，但也要确保你不是在用「帮助他人」来填补自己的空虚。"},
{t:"跑步/运动相关",a:"体能自信的表达，运动领域是当前自我价值感的主要来源。",pa:"身体运动是你的快乐源泉和自我表达方式。你从身体的活力中获得满足感，这是一种很健康的状态。"}
]},
{id:5,cat:1,q:"如果可以隐身，你最想做什么？",options:[
{t:"偷听别人怎么评价自己",a:"自我评价高度依赖外界反馈。用隐身来满足对被评价信息的掌控需求，意味着对自己的形象感到不安。",pa:"你很想别人怎么看你。这说明你的自我认同不够稳定，外界的评价对你的情绪影响很大。试着建立内在的自我评价标准。"},
{t:"做平时不敢做的事",a:"被压抑的行为冲动在「去责任化」情境下释放。知道某些行为不被允许但内心想尝试。正常试探心理。",pa:"你心里有一些在日常中不敢表达的冲动。隐身给了你安全感——也说明那些「不敢」背后可能有恐惧需要面对。"},
{t:"去看某个特别的地方/某个人",a:"强烈好奇心或依恋表达。那个目的地是当前情感投注的重心。",pa:"你心里有一个特别想去的地方或特别想见的人。那个存在对你有特殊的情感意义，值得你去追问为什么。"},
{t:"哪里也不去/不做任何事",a:"隐身的「消失」本身成为目的——有时希望从他人视线中消失，不被关注、不被要求。社交疲劳信号。",pa:"你想要的是「消失」本身。不需要做什么，只是不被任何人找到。这是你的身心在发出需要休息的信号。"},
{t:"保护别人/当隐形英雄",a:"希望做好事但不想被看到。可能反映内在善良，也可能暗示「做好事」带来的期待压力。",pa:"你愿意默默付出而不求回报。这是一种珍贵的品质，但也需要确认：你是否害怕被看见？被感激有时也是一种连接。"}
]},
{id:6,cat:1,q:"如果可以和一个人交换一天，你想和谁换？",options:[
{t:"父母（爸爸/妈妈）",a:"想理解父母、体验「有权力」的感觉，或想对父母某些行为寻找答案。",pa:"你想体验孩子的世界。这说明你在尝试理解另一个视角，也可能你好奇「如果我是孩子，我的父母会怎样对我」。"},
{t:"老师",a:"对权威角色的好奇和认同，正在积极建构对「规则与权威」的理解。",pa:"你想理解「管理者」的视角。可能你对自己当前的角色感到局限，渴望从一个更高的位置来看待问题。"},
{t:"某个同学/好朋友",a:"社交关系是核心关注。想知道对方的生活，暗示对那段关系的投入度很高。",pa:"你对某个人的生活充满好奇。这种好奇本身就是一种深度的情感投入——你很在意这段关系。"},
{t:"明星/公众人物",a:"理想化自我的投射。那个明星身上的特质就是向往成为的样子。",pa:"你有一个清晰的理想自我。那个公众人物身上的某种特质——也许是自信、才华、自由——正是你渴望拥有的。"},
{t:"宠物/不想换",a:"去责任化的渴望（做人太累了），或自我认同感较强、对自身状态基本满意。",pa:"如果选宠物：你累了，想体验一种没有压力的存在方式。如果不想换：你对自己目前的身份感到满意，这是很好的状态。"}
]},
{id:7,cat:1,q:"如果给你一个魔法橡皮擦，你最想把世界上哪件不开心的事情擦掉？",options:[
{t:"具体的创伤事件（被骂、被嘲笑）",a:"该事件在心中留下了未愈合的情绪印记。孩子直接指出的那件事就是最需要关注的心结。请认真对待。",pa:"你心里有一道还没愈合的伤。那件具体的事情仍在影响你。承认它的存在是治愈的第一步。"},
{t:"家庭冲突（爸妈吵架、离婚）",a:"家庭关系的不稳定是最大的安全感威胁。影响远超成人想象。",pa:"家庭中的冲突是你内心最大的痛。你可能把太多家庭的重担扛在了自己身上，需要学会哪些不是你的责任。"},
{t:"学业压力（考试、作业、成绩）",a:"学业焦虑已上升到情绪困扰层面。学习不再是挑战而是「不开心」的源头。",pa:"成就和表现相关的压力是你最大的负担。问问自己：你的价值是否已经被成绩和KPI定义了？"},
{t:"社交伤害（被排挤、朋友背叛）",a:"同伴关系中的创伤体验。被社交圈伤害的痛苦得到了最直接的表达。",pa:"人际关系中的伤害是你最想抹去的。这说明你非常看重关系，也因此更容易在关系中受伤。"},
{t:"已发生的丧失（亲人去世、搬家）",a:"哀伤处理仍在进行中。用「擦掉」来处理无法逆转的丧失，说明还没有完全接受现实。",pa:"你心里有一个无法接受的失去。哀伤没有时间表，但也许你需要的不是「擦掉」，而是学会和它共处。"},
{t:"想不到/擦掉别人的不开心",a:"「想不到」可能是防御性否认。「擦别人的」是高共情但可能有讨好倾向——忽略了自己的感受。",pa:"如果你想不到自己的不开心：你可能习惯了压抑负面情绪。如果你选择擦别人的：你很善良，但你的不开心同样值得被看见。"}
]},
{id:8,cat:1,q:"如果今晚外星人来做客，你最想带他去地球的哪个地方玩？",options:[
{t:"自己最喜欢的地方（游乐场等）",a:"在分享「快乐地图」。那个地方承载着积极的情绪记忆，反映有明确的情感安全基地。",pa:"你有一个很清楚的快乐之地。那个地方是你心灵的充电站。你有多久没去了？"},
{t:"学校",a:"学校在生活中占据核心正面位置，或对自己的学生/职业角色高度认同。",pa:"你认同自己当前的角色和环境，愿意把它展示给世界。这是一种自信，但也值得思考：你的人生是否被这个角色过度定义了？"},
{t:"远方/未知之地（太空、海底）",a:"强烈好奇心和探索欲。对未知的兴趣超过对已知世界的依恋，反映开放性人格特质。",pa:"你向往远方和未知。你的灵魂里有探险家的基因。但也注意：你是否在用「远方」来逃避当下的某些东西？"},
{t:"家里",a:"家是最强的安全基地。想展示的是日常的温暖而非特别的体验，说明家庭依恋关系健康。",pa:"家是你心中最好的地方。你的安全感深深扎根于家庭。这是温暖的，但也确保家不是你的全部世界。"},
{t:"哪里也不想去/随便",a:"可能反映情绪低落，或对问题的防御——不确定该怎么回答。",pa:"你对这个问题提不起兴趣。可能你正处在一种倦怠或低落的状态，需要关注自己最近的心理健康。"}
]},
{id:9,cat:1,q:"如果你发明了一种新的冰淇淋口味，它会是什么颜色的？吃起来什么味道？",options:[
{t:"明亮暖色（红橙黄）+甜味",a:"积极情绪的表达。暖色和甜味都是快乐、温暖的象征。当前情绪状态大概率是正向的。",pa:"你的内心现在充满了温暖和甜蜜。你在生活中感受到了足够的阳光，也有能力把这种温暖传递出去。"},
{t:"冷色调（蓝紫黑）+奇特口味",a:"内省型/创意型。暗色不一定是负面，可能反映对独特性的追求。但黑色+苦味需关注。",pa:"你的内心世界复杂而深邃。你追求与众不同，不满足于「标准的甜」。这是一种独特的美，也需要确保你不是在刻意远离温暖。"},
{t:"彩虹色/多色混合",a:"丰富的情感世界和高创造力。可能兴趣广泛、情绪波动也较大。",pa:"你是一个多彩的人，情绪和兴趣都很丰富。你的世界不是单一色调，而是充满变化和可能。拥抱这种丰富性。"},
{t:"和父母/朋友相关的颜色或味道",a:"关系导向的自我建构。幸福感和特定的人高度绑定。温暖表达但也暗示分离焦虑可能。",pa:"你的幸福感和某些人紧密相连。这是一种深情的表达，但也提醒你：当那些人不在身边时，你是否还能感到快乐？"},
{t:"不知道/随便什么",a:"创造力表达受阻。可能平时缺少自由发挥想象力的机会，或对「说错了」感到不安。",pa:"面对开放性的自我表达，你有些卡壳。可能你习惯了有标准答案的世界，忘了怎么自由地创造。"}
]},
{id:10,cat:2,q:"如果让你给自己起一个新的名字，你会叫什么？",options:[
{t:"用喜欢的角色/偶像的名字",a:"理想自我的投射。那个名字背后的形象就是想成为的人。",pa:"你心里住着一个理想版本的自己。那个角色的特质——勇敢？智慧？自由？——正是你在追求的方向。"},
{t:"完全不同的名字",a:"对当前身份有某种程度的不满足或好奇。探索「我还可以是谁」，正常的自我认同发展。",pa:"你对现在的「自己」有些不满足。这不是坏事——它说明你在成长，在探索更丰富的身份可能。"},
{t:"保留原名/只改一两个字",a:"自我认同稳定，对自己是谁感到舒适和安全。也可能反映对传统的归属感。",pa:"你对自己的身份感到舒适。这是一种难得的安全感和自我接纳。"},
{t:"搞笑/荒诞的名字",a:"用幽默化解自我暴露的紧张感。不好意思认真回答，用搞笑来防御。",pa:"你用幽默来保护自己。这很聪明，但也想想：你是否害怕认真对待自己？"},
{t:"有力量感的名字",a:"力量补偿。现实中可能感到无力或被压制，通过名字获得象征性的力量感。",pa:"你需要力量。现实中你可能觉得自己不够强大，但力量有很多种形式——温柔、坚持、勇气都是。"}
]},
{id:11,cat:2,q:"你觉得自己的大脑里装的最多的东西是什么？",options:[
{t:"问号/问题",a:"好奇心驱动型人格。对自己的思考能力有正面认知，健康的好奇心信号。",pa:"你是一个爱思考的人。你的脑子里总有问不完的问题。这是一种活力，但也注意：你是否用「思考」来逃避「行动」？"},
{t:"动画片/游戏/娱乐",a:"诚实的自我觉察。有自我观察意识。如果确实是唯一答案，需关注注意力是否被过度占据。",pa:"你坦然承认娱乐占据了你很多心理空间。这是诚实的，也值得反思：你的大脑是否还有空间留给更深层的思考？"},
{t:"数学公式/学习内容",a:"学业已深度内化为自我概念。可以是积极信号，也需警惕自我价值是否过度绑定在成绩上。",pa:"你的身份高度和学习/工作绑定。这可能让你很有成就，但也危险——当你不再「优秀」时，你还认识自己吗？"},
{t:"乱七八糟/什么都有一点",a:"发散型思维，可能反映注意力分散的特点，也可能是不确定感。",pa:"你的思维是发散的，什么都想、什么都关注。这是一种天赋，但有时也需要学会聚焦和舍弃。"},
{t:"情绪相关的描述（开心、担心）",a:"元认知能力较强——能观察自己的内心状态。通常情感丰富且敏感，但也更容易焦虑。",pa:"你对自己的情绪有很高的觉察力。这是一种珍贵的能力——你能感知自己的内心天气。只是别忘了，感受不等于事实。"}
]},
{id:12,cat:2,q:"如果有一天你醒来发现自己长高了10米，你第一件事想做什么？",options:[
{t:"俯瞰/看远处的风景",a:"视角扩展的渴望。可能感到「视野受限」，长高=看到更多可能性。",pa:"你渴望从一个更高的视角看问题。可能当前的处境让你觉得被困住了，你需要的是换个角度看全局。"},
{t:"做平时做不到的事",a:"突破限制的幻想。那些「做不到的事」就是感知到的限制，指向真正被压抑的愿望。",pa:"你有一些一直想做但觉得做不到的事。变高10米只是一个隐喻——也许那些事并没有你想象的那么不可能。"},
{t:"保护别人/帮助别人",a:"利他倾向的力量幻想。价值体系中「强=有责任」，健康的价值观信号。",pa:"当你变强大时，你想到的是帮助别人。这是一种高贵的本能，但也确保你不是只在帮助别人才感到自己有价值。"},
{t:"害怕/不知道怎么办",a:"对巨大变化的不安。偏好稳定和可预测，或低自我效能感。",pa:"面对突然的变化你会不安。这说明你偏好稳定和可控。变化不一定是坏事，但你需要时间来适应。"},
{t:"去吓唬别人/搞破坏",a:"被压抑的攻击性在幻想中释放。不一定是品行问题，是通过想象释放被压制的力量感。",pa:"你心里有一股被压制的力量想要释放。也许在现实中你太「乖」了，需要一个出口来表达那股野性。"}
]},
{id:13,cat:2,q:"如果给你一个小时，全世界都必须听你的指挥，你会下令让大家做什么？",options:[
{t:"让所有人开心/停止战争",a:"理想主义和共情能力。关注人类层面的问题，有超出自身生活圈的视野。",pa:"你的视野超越了个人生活，关注更宏大的命题。这说明你有很强的人文关怀，但也确保你关注到了身边具体的、需要你的人。"},
{t:"取消作业/让所有人玩",a:"对现有规则的直接反抗。具体取消了什么=压力源。",pa:"你最想推翻的就是那些让你喘不过气的规则。这个答案直接指向了你生活中最大的压力来源。"},
{t:"让爸妈陪我玩/全家人在一起",a:"依恋需求的核心表达。拥有最大的权力，想要的不过是陪伴。",pa:"你最大的愿望很小也很温暖——就是和爱的人在一起。也许在追求更多之前，先确保这个最基本的需求被满足了。"},
{t:"让世界按我的规则来",a:"掌控感和创造力。不只是自由，还要「按我的想法重新建构」。",pa:"你有强烈的建构欲和领导欲。你不只想自由，还想创造。这是领导者的特质，也需要学会倾听他人的声音。"},
{t:"不知道/想不到",a:"对权力的陌生感。日常很少有机会做决定，面对「你说了算」反而不知所措。",pa:"当权力真正交到你手上时你不知道怎么用。这说明你在日常生活中太习惯被安排了，也许可以开始从小事练习做决定。"}
]},
{id:14,cat:2,q:"如果现在身体里住着一个大人，你觉得那个大人会对现在的你说什么话？",options:[
{t:"鼓励类（加油、你很棒）",a:"内化了鼓励性声音。内在评判者是友善的，说明日常正向反馈充足。",pa:"你内心的声音是鼓励型的。这很好——但也要分辨这个声音是否真实，还是你在对自己说「应该说的话」。"},
{t:"批评/要求类（快写作业、别偷懒）",a:"内在批评者的声音。那些话=日常听到的最多的话。这是了解接收到的教育信号的最直接窗口。",pa:"你内心住着一个严厉的批评者。那些催促和批评的话——很可能就是你每天对自己说的话。你对自己太苛刻了，试着温柔一些。"},
{t:"安慰类（没关系、别害怕）",a:"内在安全基地已建立。内心有自我安抚的声音，通常来自稳定的依恋关系。",pa:"你内心有一个温暖的声音在安慰你。这是你过去接收到的爱的回声。好好珍惜这个内在的避风港。"},
{t:"不知道他会说什么",a:"内在成人形象模糊。可能缺少稳定的「内在引导者」。",pa:"你不确定内心的声音是什么。这可能因为你很少和自己对话，或接收到的外部声音太杂乱，没有形成稳定的内在引导。"},
{t:"和父母说的一模一样",a:"父母的声音已深度内化。孩子复述的那些话就是他的内在对话。",pa:"如果你的内在声音和父母的话一模一样：你还没有发展出属于自己的内在声音。试着问问自己——抛开父母的话，你自己想对自己说什么？"}
]},
{id:15,cat:2,q:"闭上眼睛想一想，身边有一个透明的保护罩，你觉得用什么做的才最结实？",options:[
{t:"坚硬材质（钢铁、钻石）",a:"对安全感有较高需求，偏好物理性的保护。可能感到脆弱或曾经历伤害。",pa:"你需要坚固的保护。这说明你在现实中感到脆弱或不安全。你的内心可能经历过一些让你觉得需要「武装自己」的事。"},
{t:"柔软材质（棉花、云朵）",a:"安全感来源是温暖而非坚硬。情绪调节更偏向自我安慰和寻求温暖关系。",pa:"你相信温柔的力量。你的安全感不来自坚硬的屏障，而是来自温暖的包裹。这是一种成熟的安全策略。"},
{t:"由人构成（爸妈的手、家人的爱）",a:"安全依恋的直接表达。安全感完全建立在关系上——有人在=安全。",pa:"你的安全感来自人——那些爱你的人就是你的铠甲。这是深情的，但也意味着当那些人不在时你会特别脆弱。"},
{t:"魔法/超自然力量",a:"想象力和控制感的结合。自己可以创造安全感，反映较高的自我效能感。",pa:"你相信自己有能力保护自己。你的安全感来自内在的力量感而非外在的屏障。这是非常健康的心理状态。"},
{t:"没有保护罩/不结实",a:"⚠️ 安全感缺失的重要信号。感觉自己是暴露的、没有保护的。",pa:"你感觉自己没有保护。这种暴露感可能来自现实中的不安全感，也可能是内在防御系统失效的信号。你需要认真关注自己的安全感需求。"},
{t:"无形的东西（空气、光、音乐）",a:"高度抽象思维和内在资源丰富。安全感来自内在而非外部，是心理韧性的积极信号。",pa:"你的安全感来自看不见的东西——也许是信念、审美、或内在的平静。你有一种超越物质的精神力量。"}
]},
{id:16,cat:3,q:"你觉得做什么事，会让自己很开心？",options:[
{t:"玩/游戏/运动",a:"游戏是儿童的核心活动，能从中获得快乐说明情绪调节功能正常。",pa:"你从玩乐中获得快乐。这是最原始也最健康的快乐来源。但作为成人，你是否还保留了「纯粹为了玩」的时间？"},
{t:"和家人在一起/爸妈陪我",a:"依恋满足是核心快乐来源。家庭关系是安全感的主要来源。",pa:"家人是你最大的快乐来源。这很温暖，但也意味着你的情绪高度依赖家人的在场和状态。"},
{t:"学习/看书/获得新知识",a:"学习动机已内化。可以是积极信号，也需关注是否将「有用」作为快乐的前提。",pa:"你从学习和成长中获得快乐。这是一种高质量的内驱力，但也要确保你不是把「有用」当成了快乐的唯一标准。"},
{t:"吃好吃的/获得物质奖励",a:"即时满足导向。如果这是唯一答案，情绪调节可能较依赖外部刺激。",pa:"感官享受是你的主要快乐来源。这不一定是坏事，但如果快乐只能通过消费获得，可能需要发展更多内在的满足渠道。"},
{t:"没什么让我开心的",a:"⚠️ 需要警惕。可能反映情绪低落、兴趣减退，也可能是述情障碍。",pa:"你说不出什么让你开心。这可能意味着你太久没有关注过自己的感受了，或者快乐在你生活中已经被挤压得没有空间了。"}
]},
{id:17,cat:3,q:"你感到不开心的时候你会做什么？",options:[
{t:"哭",a:"最本能的情绪表达。哭泣是健康的情绪释放机制。",pa:"你允许自己哭泣。这是一种勇气——很多人已经忘了怎么哭。眼泪是你和情绪之间最诚实的对话。"},
{t:"独处/不想说话/躲起来",a:"内倾型情绪处理。如果每次都独处且持续时间长，可能缺少可信赖的倾诉对象。",pa:"你习惯一个人消化情绪。独处确实有治愈力，但也确保你不是因为不信任任何人而选择封闭。"},
{t:"找人说话（爸妈/朋友）",a:"外倾型情绪处理，通过社交互动调节情绪。有安全的关系可以求助。",pa:"你难过时第一反应是找人倾诉。这说明你有安全的社交网络，是一种健康的情绪调节方式。"},
{t:"发脾气/摔东西/打人",a:"情绪调节能力尚未充分发展。用外化行为释放内在痛苦。",pa:"你的情绪会通过激烈的行为释放。这不是因为你脾气差，而是因为你还没有找到更合适的出口来处理那些强烈的感受。"},
{t:"转移注意力（看电视、玩游戏）",a:"回避型应对策略。短期有效但长期可能阻碍情绪处理。",pa:"你习惯用转移注意力来处理不开心。这能暂时缓解，但那些被搁置的情绪并没有消失——它们只是被推迟了。"},
{t:"不知道/没什么办法",a:"情绪调节策略缺乏。可能从来没有被教导过如何处理负面情绪。",pa:"面对不开心，你手足无措。这说明你从小可能没有学过「怎么和坏情绪相处」——这不是你的错，但现在可以开始学。"}
]},
{id:18,cat:3,q:"你生气的时候怎么让自己冷静下来？",options:[
{t:"深呼吸/数数/离开现场",a:"已习得成熟的情绪调节策略。说明日常接收到了有效的情绪教育。",pa:"你有成熟的情绪调节技巧。这说明你在情绪管理上有过良好的学习和练习。"},
{t:"哭出来/大喊",a:"通过生理释放来调节。允许情绪流动比压抑更健康。",pa:"你让情绪自然流动而不是堵住它。这是一种本能但有效的策略——释放比压抑更健康。"},
{t:"打枕头/撕纸/画画",a:"替代性攻击行为。在发展社会化的情绪表达，但愤怒强度较高。",pa:"你找到了不伤害他人的方式来释放愤怒。这是聪明的做法——你在愤怒和理性之间找到了平衡点。"},
{t:"冷静不下来/越冷静越气",a:"诚实但值得关注。可能正处于情绪调节困难期，或愤怒源过于强烈。",pa:"你发现冷静对你来说很难。这说明你的愤怒不是表面的——它可能积压了太久，不是简单的「冷静技巧」能处理的。"},
{t:"找人倾诉/告状",a:"通过社会支持调节情绪。知道「说出来会好受一些」，健康的关系利用能力。",pa:"你用「说出来」来消解愤怒。语言是比行动更成熟的出口，你在选择用对话而非冲突来处理问题。"}
]},
{id:19,cat:3,q:"你最不喜欢别人说你什么？",options:[
{t:"否定能力（笨、做不好）",a:"自我价值感的核心痛点。最害怕被否定的领域=最在意、最不自信的地方。",pa:"你最怕被否定能力。这说明「做得好」在你的自我认同中占很大比重。你的价值感可能太依赖于表现了。"},
{t:"外貌评价（胖、丑、黑）",a:"身体意象敏感期。对外貌已有负面认知，需关注是否有被嘲笑的经历。",pa:"外貌评价是你最敏感的点。这可能来自过去的某次伤害，也可能来自社会审美标准的内化。你的价值远不止于外表。"},
{t:"性格否定（胆小、爱哭、话多话少）",a:"个性特质被标签化的创伤。天生特质被反复否定，会形成「我这个人有问题」的核心信念。",pa:"你最怕别人否定你的性格。这说明你曾因为「做自己」而被批评过。那些标签不是你的错——你的性格特质本身没有问题。"},
{t:"比较类（你看人家XX）",a:"比较带来的羞耻感。反感的不是比较本身，而是比较中隐含的「你不够好」。",pa:"你讨厌被比较。这个反应很正常——比较本质上是一种隐性的否定。也反思一下：你是否也在无意中拿自己和别人比较？"},
{t:"什么都行/没有不喜欢的",a:"防御性回答。不敢表达真实感受，或自我觉察不足。",pa:"你说没有特别不喜欢被说的。这可能说明你还没认真想过这个问题，或者你习惯了不去表达自己的边界。"}
]},
{id:20,cat:3,q:"如果有人说你坏话，你怎么办？",options:[
{t:"告诉老师/爸妈",a:"寻求权威保护，说明信任成人系统，有求助意识。",pa:"你选择向权威求助。这是一种理性的策略，但也思考：如果没有权威可依靠时，你能自己处理吗？"},
{t:"当面怼回去/吵架",a:"自我保护本能较强。有反击勇气但也需教导适度回应。",pa:"你面对攻击会直接反击。这说明你有强烈的自我保护意识。但也需要注意：反击有时候不是最好的策略，选择何时回应也是智慧。"},
{t:"不理他/装没听见",a:"回避型应对。可能是成熟选择，也可能是无力感的表达。",pa:"你选择不回应。这可能是成熟的判断（不值得回应），也可能是你觉得自己没有力量改变什么。分辨这两者的区别很重要。"},
{t:"很难过/偷偷哭",a:"言语伤害对情绪影响很大。缺乏有效应对策略，内心可能积累了不少委屈。",pa:"别人的话能深深伤害你。你选择独自消化这种痛苦。这不是软弱，但如果这种情况经常发生，你需要学会保护自己的方式。"},
{t:"也说他坏话",a:"以牙还牙的应对方式。尚未发展出更成熟的冲突处理模式。",pa:"你选择用同样的方式回击。这是一种本能反应，但想想：用对方的方式回应，是否也让你变成了你不喜欢的人？"},
{t:"不知道/没遇到过",a:"可能是防御性否认。如果回避回答，可能意味着正在经历但不想说。",pa:"你说没遇到过。如果是真的，那很幸运。如果是在回避这个话题——你正在经历什么？"}
]},
{id:21,cat:3,q:"如果今天不小心闯了一个小祸，你最希望爸爸妈妈用什么样子的表情看着你？",options:[
{t:"温柔/微笑的表情",a:"核心需求：即使做错事仍然希望被爱。反映安全型依恋——相信犯错不会动摇父母的爱。",pa:"你需要确认：即使我犯了错，我仍然被爱。这是一种很深的渴望——犯错时的温柔，比任何时候的温柔都更有力量。"},
{t:"不生气/平静的表情",a:"对父母情绪反应的恐惧。最怕的是父母的情绪失控。希望「不生气」=我害怕你的愤怒。",pa:"你害怕的不是惩罚，而是对方的情绪失控。这说明你可能经历过他人情绪爆发带来的恐惧，平静是你最大的渴望。"},
{t:"担心/关心的表情",a:"想确认「你们在意我吗？」即使在犯错的时候。这是一种依恋确认行为。",pa:"你在犯错的时候最想看到的是关心。你需要的不是教育或惩罚，而是确认关系没有因为你的错误而改变。"},
{t:"严肃但不凶的表情",a:"能区分「教育」和「情绪化」，希望认真对待但不情绪化。相当成熟的回答。",pa:"你对情绪管理有很高的期待——你希望对方认真对待问题但不被情绪控制。这说明你重视理性，也害怕被情绪化地对待。"},
{t:"无所谓/什么表情都行",a:"可能是防御性回答——不敢表达真实期望，也可能反映对父母反应的漠然。",pa:"你说无所谓。但真的无所谓吗？有时候说「无所谓」恰恰是因为太在意了，怕说出来会失望。"}
]},
{id:22,cat:3,q:"什么时候你会觉得心里像有个小太阳晒着一样暖和？",options:[
{t:"和家人在一起的时刻",a:"家庭依恋是核心安全感来源。温暖的家庭时刻就是「安全基地」的记忆锚点。",pa:"家人给你的温暖是无可替代的。你的情感充电站就是和爱的人在一起的平凡时刻。"},
{t:"被表扬/被认可的时候",a:"外在认同是重要的情绪能量来源。如果这是唯一答案，可能自我价值感过度依赖外界评价。",pa:"他人的认可让你感到温暖。这很正常，但也要培养一种不依赖外部认可的内在温暖——你自己也可以成为自己的小太阳。"},
{t:"做喜欢的事情时",a:"内在满足驱动的快乐。有明确的兴趣领域和自我愉悦能力，心理韧性较好。",pa:"你能从做自己喜欢的事中获得深层满足。这是一种珍贵的能力——你有自我滋养的方式。"},
{t:"和朋友在一起/帮助别人的时候",a:"关系导向的温暖感。社交连接是情绪能量的主要来源。",pa:"关系给你温度。和朋友在一起、帮助他人的时刻让你感到自己是有价值的。这种来自连接的温暖是持久的。"},
{t:"很少有这种感觉/说不上来",a:"⚠️ 需关注。可能很少体验到深层的温暖和安全感，情绪基调偏低落。",pa:"你很少感到那种深层的温暖。这可能说明你的生活缺少滋养性的关系或体验，或者你习惯了压抑温暖的感受。"}
]},
{id:23,cat:3,q:"有没有什么事情是你以前很害怕，但现在觉得其实也没那么可怕的？",options:[
{t:"具体恐惧（黑暗、打雷等）",a:"正常的恐惧发展轨迹。能识别自己的成长变化，元认知能力在发展。",pa:"你克服过具体的恐惧。这说明你有面对恐惧的经验和能力。记住这种感觉——下次害怕时你可以告诉自己：我曾经也害怕过，但我过来了。"},
{t:"社交类恐惧（上台发言等）",a:"社交焦虑的克服经历。社会能力在发展。",pa:"你在社交领域的恐惧减少了。这来自一次次「硬着头皮上」的经验——每一次面对恐惧都让你更强大。"},
{t:"学业类（考试、某个科目）",a:"学习自信的建立过程。获得了足够的支持和成功经验。",pa:"你在学习中找到了自信。那些曾经害怕的事情变成了你擅长的——这说明困难是可以被克服的。"},
{t:"家庭相关（爸妈吵架、被骂）",a:"可能是家庭环境改善了，或应对能力增强了。也需留意是否是「习惯了」的麻木。",pa:"如果你不怕家庭冲突了：你变强大了，学会了在风暴中站稳。但也要确保这不是「麻木」——习惯了痛苦不等于痛苦不存在。"},
{t:"没有/什么都还是怕",a:"恐惧固化——缺乏克服恐惧的经验和支持。",pa:"你觉得什么都没变。也许你还没有找到面对恐惧的方法和支持。恐惧不需要一次克服，但需要有人陪你一步步来。"},
{t:"我什么都不怕",a:"可能是健康自信，也可能是防御性否认——承认害怕被视为「丢脸」。",pa:"你说什么都不怕。如果真的什么都不怕——那很棒。但也想想：是否有些恐惧被你压得太深了，以至于你自己都意识不到？"}
]},
{id:24,cat:3,q:"如果心里很难过，你是希望有人一直陪着你说话，还是希望一个人安静待会儿？",options:[
{t:"有人陪/一直说话",a:"外倾型情绪处理。通过社交互动调节情绪，有安全的关系可以求助。",pa:"你难过时需要有人陪。你不喜欢独自面对痛苦——有人在身边就能让你感到安全和被支撑。"},
{t:"一个人安静待着",a:"内倾型情绪处理。需要独处来消化情绪，尊重这种需求很重要。",pa:"你需要空间来独自处理情绪。这不是冷漠——你的内心需要一个安静的环境来完成情绪的消化和整合。"},
{t:"先安静待一会儿，然后找人说话",a:"最成熟的情绪处理策略：先自我消化再寻求支持。",pa:"你有成熟的节奏感——先给自己时间消化，再寻求外界支持。你知道自己需要什么，也知道什么时候需要。"},
{t:"希望陪的人不要说话",a:"深层需求：需要你在，但不需要你「做什么」。这是对「存在性陪伴」的渴望。",pa:"你要的不是对话而是陪伴。你在说：我不需要你说什么或做什么，只需要你在那里。这是最深沉的连接需求。"},
{t:"都可以/不知道",a:"可能从未思考过这个问题。情绪处理可能是被动的而非主动选择。",pa:"你没有想过这个问题。也许你的情绪处理方式一直是随机的——取决于当时谁在身边。试着去观察自己，找到最适合你的方式。"}
]},
{id:25,cat:3,q:"你觉得眼泪是用来干什么的？",options:[
{t:"排放伤心/难过的",a:"对情绪功能的直觉性理解。体验到过哭泣后的释放感。健康的情绪认知。",pa:"你把眼泪看作情绪的出口。你允许自己通过哭泣来释放——这是一种健康的情绪管理方式。"},
{t:"让别人知道我很难受",a:"理解眼泪的社交功能。即使嘴上不说，眼泪也能传达内心。有社交智慧。",pa:"你认为眼泪是一种沟通。你在说：当我无法用语言表达时，让眼泪替我说。这说明你重视被理解。"},
{t:"清洗眼睛/生理功能",a:"认知导向回答，回避了情绪层面。可能对谈论情绪感到不自在。",pa:"你用理性来回避情感话题。当你被问到感受时，你的第一反应是给一个「科学答案」而不是真实体验。"},
{t:"没用的/弱的人才哭",a:"⚠️ 重要信号。压抑哭泣=压抑情绪表达，长期可能导致情绪调节困难。",pa:"你认为哭是软弱。这个信念很危险——它让你在最需要释放的时候堵住自己。哭不是软弱，是勇敢。"},
{t:"表达开心/感动的眼泪",a:"高情感粒度——能区分不同情绪背景下的眼泪。情感智力较高。",pa:"你知道眼泪不只是悲伤。你体验过感动和喜悦的泪——这说明你的情感世界很丰富，也有能力被美好触动。"}
]},
{id:26,cat:4,q:"什么事情会让你觉得「哎呀，我真棒」？",options:[
{t:"取得成绩（考好、得奖）",a:"成就导向的自我价值感。将「棒」与「表现好」等同。如果这是唯一来源，自我价值过于条件化。",pa:"你的自豪感主要来自成就。这驱动你前进，但也问问自己：如果暂时没有成就，你还觉得自己棒吗？"},
{t:"帮助了别人",a:"关系/利他导向。从「对他人有价值」中获得自我肯定。",pa:"你从帮助他人中获得价值感。这是一种温暖的驱动力，但也确保你不是只在被需要时才觉得自己有意义。"},
{t:"克服困难的时刻",a:"自我效能感的健康表达。欣赏挑战而非回避挑战。",pa:"你从克服困难中获得力量。你不怕难题——难题是你证明自己的机会。这是一种很棒的心态。"},
{t:"日常的微小成就",a:"健康的自我肯定模式——不依赖大事也能感到自豪。有较好的内在价值感。",pa:"你能从日常小事中感到满足。这是一种珍贵的能力——你不需要大事来证明自己，日常的你就已经很好了。"},
{t:"很少觉得/想不到",a:"⚠️ 自我价值感偏低。缺乏自我肯定的经验和记忆，可能日常正向反馈不足。",pa:"你很少觉得自己棒。这让人心疼。也许你太久没有被肯定了，或者你对自己太苛刻了。从今天开始，每天找一件让自己觉得棒的小事。"},
{t:"被别人夸奖的时候",a:"自我价值完全外化。需要外界确认才能觉得自己棒——内在评价体系尚未建立。",pa:"你需要别人告诉你「你很棒」才能相信。这意味着你的自我评价系统还没有独立运作——试着成为自己最忠实的肯定者。"}
]},
{id:27,cat:4,q:"睡觉前，你脑子里最后冒出来的念头通常是什么？",options:[
{t:"明天要做的事/安排",a:"未来导向型思维。可能有期待感，也可能暗示对不确定性的焦虑。",pa:"你的大脑在睡前自动切换到「计划模式」。这说明你对明天有关注——但也可能你对「不确定」感到不安，需要用计划来获得控制感。"},
{t:"今天发生的事",a:"反刍型思维。如果总回顾烦心事，可能日间压力未得到充分释放。",pa:"你在睡前回顾白天的一切。如果是快乐的事——很好。如果是烦心事——你的大脑还没有学会在睡前「关机」，那些未处理的情绪在找你。"},
{t:"天马行空的想象",a:"创造力和安全感的标志。能在睡前自由想象说明感到安全且内心世界丰富。",pa:"你的睡前时光是想象力的游乐场。这说明你感到安全——只有在安全的环境中，大脑才会允许自己自由漫游。"},
{t:"想着某个人（爸妈、朋友）",a:"关系导向的内在对话。睡前想到的人是情感投注最重的对象。",pa:"睡前你想到的人是你最深的牵挂。那个人在你的心里占据着最柔软的位置。"},
{t:"什么都不想/很快睡着",a:"可能睡眠质量好，也可能是情绪回避。",pa:"如果你很快入睡：你的身心很放松。如果是不愿意想：你可能在用「快速入睡」来回避面对独处时的内心声音。"},
{t:"害怕的东西（黑暗、鬼怪）",a:"睡前焦虑，安全感不足。夜晚的黑暗和独处放大了恐惧。",pa:"夜晚让你感到不安。黑暗和安静放大了你的恐惧。这说明你的安全感在白天可能也不够充足，只是在忙碌时被掩盖了。"}
]},
{id:28,cat:5,q:"你的好朋友都是谁？你为什么想和他做好好朋友呢？",options:[
{t:"因为好玩/一起玩得开心",a:"以共同活动为基础的友谊，正常且健康的交友动机。",pa:"你和朋友的关系建立在共同快乐上。这是最纯粹的友谊基础——能一起玩的人就是好朋友。"},
{t:"因为他对我好/会帮我",a:"关系中的互惠意识。看重的是关系带来的情感支持。",pa:"你选择朋友的标准是「对我好」。这说明你在关系中寻求安全感和支持，也可能你比较需要被照顾的感觉。"},
{t:"因为他学习好/很厉害",a:"以能力为交友标准。可能反映对优秀品质的向往，也可能竞争意识较强。",pa:"你被优秀的人吸引。这说明你有向上生长的动力，但也注意：友谊不是排名，普通朋友也有独特的价值。"},
{t:"因为住得近/是同班同学",a:"地理便利型友谊。社交圈较为被动——不是主动选择而是和「刚好在身边的人」做朋友。",pa:"你的朋友圈主要由环境决定。这不一定是坏事，但也想想：如果有机会自由选择，你会选什么样的人做朋友？"},
{t:"说不上来/就是喜欢",a:"直觉型社交偏好。对人有本能的喜好，成熟的社交直觉。",pa:"你对人的喜欢是一种直觉——不需要理由。这说明你有很强的感受力，能感知到一个人是否和你「频率相同」。"},
{t:"没有好朋友",a:"⚠️ 需关注。可能反映社交困难、被孤立，或对「好朋友」定义标准很高。",pa:"你说没有好朋友。这可能是你当前的真实状态，也可能是你对「好朋友」的定义很严格。无论哪种，你值得拥有让你感到被理解的关系。"}
]},
{id:29,cat:5,q:"如果好朋友不开心，你会怎么陪伴他？",options:[
{t:"陪他说话/问他怎么了",a:"主动关怀型。具备共情能力和主动沟通的社交技巧。",pa:"你面对朋友的痛苦时选择主动靠近和倾听。这是一种勇敢的关怀——你没有逃避对方的情绪，而是选择陪伴。"},
{t:"和他一起玩/做开心的事",a:"通过活动转移注意力。理解的陪伴方式是「一起做快乐的事」。",pa:"你的安慰方式是带对方做开心的事。这是你自己的快乐处方——你把自己觉得好的东西分享给了朋友。"},
{t:"给他东西（零食、玩具）",a:"物质化的关怀表达。可能来自家庭中爱的表达方式。",pa:"你用给予来表达关心。这是你学会的爱的语言——通过「给」来传达「我在乎你」。"},
{t:"不知道该怎么做",a:"有共情但缺少具体策略。需要教导具体的安慰技巧。",pa:"面对朋友的不开心你手足无措。这不是你不在乎——而是你不确定怎么做才对。其实最简单的一句「我在」就很好。"},
{t:"抱抱他",a:"身体化的共情表达。最直接也最有效的安慰方式。",pa:"你的第一反应是拥抱。你知道有时候身体比语言更能传达「我在这里，你不是一个人」。"}
]},
{id:30,cat:5,q:"在学校下课时间和同学有什么有趣的事情吗？",options:[
{t:"追逐打闹/体育运动",a:"体能导向的社交方式。通过身体活动建立同伴关系，精力充沛。",pa:"你在动态活动中建立社交连接。你的人际互动模式是「一起做」而不是「一起说」。"},
{t:"聊天/讲故事/八卦",a:"语言导向的社交。从对话中获得社交满足，人际关系能力较强。",pa:"你通过对话来连接他人。你是一个社交型的沟通者，享受和人交流的过程。"},
{t:"玩桌游/画画/手工",a:"结构化活动的社交方式。在有规则的活动中感到舒适。",pa:"你在有结构的活动中社交。你需要一定的框架来降低社交的不确定性，这是一种舒适的社交策略。"},
{t:"一个人待着/看书",a:"社交参与度低。可能是性格偏好（内向），也可能是社交回避。",pa:"你在课间选择独处。这不一定是问题——内向的人需要独处来充电。但也注意是否在回避社交。"},
{t:"没什么有趣的",a:"对学校社交体验评价较低。可能在同伴关系中缺乏归属感。",pa:"你觉得日常社交没什么有趣的。这可能说明你还没有找到让你感到真正投入的社交圈或活动。"}
]},
{id:31,cat:5,q:"谁是你最信任的人？",options:[
{t:"妈妈/爸爸",a:"最典型也最健康的答案。父母是首要信任对象说明依恋关系良好。",pa:"父母是你最信任的人。这说明你在家庭中建立了安全的依恋基础。"},
{t:"爷爷奶奶/外公外婆",a:"隔代依恋。通常出现在祖辈参与养育较多的家庭中。",pa:"你最信任的是祖辈。这说明他们在你的成长中扮演了重要角色，是你情感世界的核心支柱。"},
{t:"好朋友/同学",a:"同伴信任已建立。在家庭之外也有安全的关系基础。",pa:"你最信任朋友。这说明你在家庭之外建立了深度的信任关系，你的社交能力发展得很好。"},
{t:"自己",a:"内在力量和自我信任。独立性强，但也可能反映对外部关系的不信任。",pa:"你最信任自己。这是一种强大的内在力量，但也问问自己：是因为不需要别人，还是因为不敢信任别人？"},
{t:"宠物/没有特别信任的人",a:"宠物不会评判、不会背叛。如果只信任宠物可能反映人际信任创伤。「没有」是信任缺失信号。",pa:"如果你信任宠物：动物的无条件陪伴是你最安全的港湾。如果没有信任的人：你可能在关系中受过伤，或者还没有遇到让你敢完全信任的人。"}
]},
{id:32,cat:5,q:"如果有人抢走你的东西，你会怎么办？",options:[
{t:"告诉老师/大人",a:"寻求权威介入，说明有制度信任感和求助意识。",pa:"你选择找权威来解决。这是理性的策略，但也思考：如果权威不在场，你能自己处理吗？"},
{t:"抢回来/打回去",a:"自我保护本能强烈。有较强领地意识和反击意愿。",pa:"你面对侵犯会直接反击。你有强烈的领地意识和保护自己的力量。但也要学会判断：什么时候值得反击，什么时候需要策略。"},
{t:"哭/很委屈但不敢反抗",a:"冲突回避+情绪内化。面对侵犯时缺乏自我保护的力量感。",pa:"你在被侵犯时感到无力。这不是你的错——但你可以学习温和而坚定地表达自己的边界：「这是我的，请还给我。」"},
{t:"算了/给他吧",a:"表面「大度」可能掩盖无力感。需区分真的不在意还是觉得反抗也没用。",pa:"你选择放弃。可能是你真的不在意那个东西，也可能是你觉得反抗没有用。如果是后者——你值得为自己的权益发声。"},
{t:"和他商量/讲道理",a:"成熟的冲突解决策略。相信沟通可以解决问题。",pa:"你选择用沟通来解决冲突。你相信道理比拳头更有力量。这是一种很成熟的态度。"}
]},
{id:33,cat:5,q:"你觉得一个真正的好朋友，应该像什么动物或者什么东西？",options:[
{t:"忠诚型动物（狗）",a:"对友谊的核心期待是忠诚和不离不弃。可能来自对关系不稳定性的体验。",pa:"你最看重的是忠诚。你可能经历过朋友「变心」或离开，所以「一直都在」是你对友谊最深的渴望。"},
{t:"温暖型（猫、毛绒玩具）",a:"对友谊的核心期待是温暖和舒适。需要「在一起就很安心」的关系。",pa:"你在朋友身上寻找的是温暖。你需要那种不用做什么、只是在一起就安心的关系。"},
{t:"保护型（大象、狮子）",a:"安全感需求投射到友谊中。在朋友关系中寻求被保护。",pa:"你希望朋友是你的保护者。这说明你在社交中可能感到脆弱，需要一个强大的人给你安全感。"},
{t:"有趣的（猴子、小丑）",a:"社交中的乐趣导向。友谊的核心定义是「快乐」。",pa:"你觉得好朋友应该是有趣的。你把快乐放在关系的核心位置——能一起笑的人就是好朋友。"},
{t:"说不上来",a:"对友谊概念尚在发展中。可能缺少深度友谊的体验。",pa:"你没有想过好朋友应该像什么。也许你还没有过那种「就是这个人」的深度友谊体验——它值得你去期待和寻找。"}
]},
{id:34,cat:5,q:"你最想在班级里扮演什么样的角色？",options:[
{t:"搞笑大王/开心果",a:"通过幽默获取关注和接纳。可能反映对「被忽略」的恐惧。",pa:"你想成为那个让大家笑的人。幽默是你的社交武器——但也想想：如果不搞笑，大家还会注意到你吗？"},
{t:"领导者/班长",a:"权力和社会地位的追求。也可能对现实中「说了不算」的补偿。",pa:"你渴望在群体中有影响力。这是领导力的体现，但也确保你不是在用「控制」来填补内心的不安全感。"},
{t:"守护者/保护别人的人",a:"责任导向。在群体中认同照顾者角色，共情能力和责任感较强。",pa:"你想保护别人。这是一种温暖的角色认同，但也注意：你是否总是在照顾别人而忘了照顾自己？"},
{t:"隐形人/安静的人",a:"低社交需求或社交回避。不想在群体中「被看到」。",pa:"你不想成为焦点。这可能是因为你享受低调，也可能是因为被关注让你不安。分辨这两者很重要。"},
{t:"聪明人/学霸",a:"智力认同的追求。学业成就在自我价值中占核心地位。",pa:"你希望因为聪明而被认可。知识和能力是你的铠甲，但也确保你不是用「成绩好」来换取被爱的资格。"}
]},
{id:35,cat:5,q:"如果看到别的小朋友被欺负了，你会怎么做？",options:[
{t:"上去帮忙/阻止欺负",a:"高共情+高行动力。有健康的自尊和正义感。",pa:"你看到不公会直接行动。你有勇气站出来——这是一种珍贵的品质。你的正义感是你人格中闪亮的部分。"},
{t:"告诉老师/找大人帮忙",a:"知道自己能力边界并寻求帮助——成熟的应对策略。",pa:"你选择寻求更有力的帮助。这是理性的判断——你知道一个人的力量有限，找到对的人来帮忙是智慧。"},
{t:"安慰被欺负的人（事后）",a:"共情但回避直接冲突。善良但可能缺乏直接介入的勇气。",pa:"你选择在事后默默安慰。你有关怀的心但可能不敢正面对抗。这也是一种善良——被欺负的人同样需要事后的温暖。"},
{t:"不知道/旁观",a:"旁观者效应。对冲突感到恐惧或不确定该怎么做。",pa:"你不确定该怎么做。这很正常——面对冲突大多数人都犹豫。但你可以从最小的行动开始，比如事后关心一下那个人。"},
{t:"觉得是他自己的问题",a:"⚠️ 受害者有罪论的早期形态。可能是心理防御——「他有错才被欺负，那我不犯错就安全了」。",pa:"你倾向于认为被欺负的人也有问题。这可能是一种心理防御——如果承认无辜的人也会被欺负，那世界就太不安全了。"}
]},
{id:36,cat:5,q:"如果班里新转来一个不敢说话的同学，你会怎么让他不紧张？",options:[
{t:"主动和他说话/自我介绍",a:"主动社交型。能代入对方的紧张感并采取行动，共情能力和社交主动性兼具。",pa:"你会主动靠近那个不安的人。你有能力感知他人的紧张并愿意打破僵局。这是一种温暖的主动性。"},
{t:"带他认识其他同学/带他玩",a:"社交桥梁角色。在群体中有一定的安全感和自信。",pa:"你愿意做「桥梁」——把新人介绍到你的社交圈。这说明你在群体中感到安全，也有分享这种安全感的慷慨。"},
{t:"给他时间/不强求他说话",a:"尊重型应对。理解不是所有人都能马上融入，这种耐心反映了对他人感受的深度理解。",pa:"你选择给对方空间。你理解每个人有自己的节奏——这种尊重本身就是一种高级的共情。"},
{t:"不知道该怎么做",a:"有善意但缺少具体策略。可以通过讨论来丰富社交工具箱。",pa:"你想帮忙但不知道怎么帮。这很正常——不是每个人天生就会。你可以从最简单的开始：对他微笑就好。"},
{t:"和我没关系/不管他",a:"社交疏离或共情发展不足。需关注是否自己也曾是新来的但没得到帮助。",pa:"你选择不介入。也许你觉得这不关你的事，也许你自己也曾是新来的但没人帮你。如果是后者——你更能理解那个同学的感受。"}
]},
{id:37,cat:6,q:"如果有100块钱，你会怎么花这笔钱？",options:[
{t:"全买自己喜欢的东西",a:"即时满足导向。正常的发展阶段表现，对自由支配的钱感到兴奋。",pa:"你的第一反应是满足自己。这很真实——但也想想：如果钱多一些，你会不会想分一些给别人？"},
{t:"存起来",a:"延迟满足能力较强。可能来自储蓄教育，也可能反映对匮乏的焦虑。",pa:"你选择存钱而不是花。这说明你有规划和自控力。但也区分：你是因为想存还是因为不敢花？"},
{t:"给家人买礼物",a:"关系导向的消费观。第一反应是用资源表达爱，说明家庭关系中有充分的爱的流动。",pa:"你首先想到的是家人。你用钱来表达爱——这说明你的人际关系中有足够的温暖，你自然也想着回馈。"},
{t:"分享/给朋友也买一份",a:"社交分享型。在资源分配中自动考虑他人，共情和社交能力较强。",pa:"你有钱了就想分享。这是一种慷慨的本能——你从给予中获得的快乐可能比独享更多。"},
{t:"一部分花一部分存",a:"平衡型策略。兼具享受当下和规划未来的能力，较成熟的金钱观。",pa:"你在享受和规划之间找到了平衡。这是成熟的金钱态度——既不亏待当下的自己，也为未来的自己负责。"},
{t:"不知道怎么花/问爸妈",a:"金钱决策经验缺乏。面对选择时依赖权威。",pa:"面对金钱选择你犹豫了。这说明你在财务决策上缺少练习。从小事开始自己做决定——花错了也是一种学习。"}
]},
{id:38,cat:6,q:"你喜欢做小孩还是想做大人？",options:[
{t:"想做大人",a:"对自主权和自由的渴望。也可能反映对被安排/被管控的不满。",pa:"你渴望自主。在你的生活中可能感到太多限制和安排。但做大人也意味着更多责任——你准备好了吗？"},
{t:"喜欢做小孩",a:"当前生活状态舒适，在「被照顾」的位置上感到安全和满足。",pa:"你享受被照顾的感觉。这说明你当前的生活环境让你感到安全。但也要想想：你是不是有些害怕独立？"},

// ═══ GAME STATE ═══
let state={currentQ:null,childAnswer:null,parentAnswer:null,completed:{},selectedCat:0};

// ═══ NAVIGATION ═══
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showWelcome(){showScreen('welcome')}
function showDeck(){showScreen('deck');updateDeck()}
function showProgress(){renderProgress();showScreen('progress')}

// ═══ DECK ═══
function startGame(){showScreen('deck');updateDeck()}
function updateDeck(){
  const done=Object.keys(state.completed).length;
  document.getElementById('deckProgress').style.width=(done/45*100)+'%';
  document.getElementById('deckProgressText').textContent=done+'/45';
  document.getElementById('deckFooter').textContent=done===45?'🎉 所有问题都聊完啦！':`还有 ${45-done} 个问题等你探索~`;
  const pills=document.getElementById('catPills');
  let html=`<button class="cat-pill ${state.selectedCat===0?'active':''}" onclick="filterCat(0)">全部</button>`;
  categories.forEach(c=>{const qs=questions.filter(q=>q.cat===c.id);const d=qs.filter(q=>state.completed[q.id]).length;html+=`<button class="cat-pill ${state.selectedCat===c.id?'active':''} ${d===qs.length?'done':''}" onclick="filterCat(${c.id})">${c.emoji} ${c.name}</button>`});
  pills.innerHTML=html;
  document.getElementById('cardStack').style.display='';
  document.getElementById('flipContainer').style.display='none';
  document.getElementById('flipInner').classList.remove('flipped');
}
function filterCat(id){state.selectedCat=id;updateDeck()}

// ═══ DRAW CARD ═══
function drawCard(){
  let pool=questions.filter(q=>!state.completed[q.id]);
  if(state.selectedCat>0){const cp=pool.filter(q=>q.cat===state.selectedCat);if(cp.length>0)pool=cp}
  if(!pool.length){alert('这个分类的问题都聊完啦！');return}
  const q=pool[Math.floor(Math.random()*pool.length)];
  state.currentQ=q;state.childAnswer=null;state.parentAnswer=null;
  document.getElementById('cardStack').style.display='none';
  const fc=document.getElementById('flipContainer');fc.style.display='';
  const cat=categories.find(c=>c.id===q.cat);
  document.getElementById('flipCat').textContent=cat.emoji+' '+cat.name;
  document.getElementById('flipNum').textContent='第 '+q.id+' 题 / 共 45 题';
  document.getElementById('flipText').textContent=q.q;
  setTimeout(()=>{document.getElementById('flipInner').classList.add('flipped');setTimeout(()=>showAnswerScreen(q),3000)},400);
}

// ═══ ANSWER SCREEN ═══
function showAnswerScreen(q){
  const cat=categories.find(c=>c.id===q.cat);
  document.getElementById('answerQDisplay').innerHTML=`<span class="q-cat-tag">${cat.emoji} ${cat.name}</span><div class="q-number">第 ${q.id} 题 / 共 45 题</div><div class="q-question">${q.q}</div>`;
  document.getElementById('childOptions').innerHTML=q.options.map((o,i)=>`<button class="option-btn" onclick="selectChild(${i})" id="cOpt${i}">${o.t}</button>`).join('');
  document.getElementById('parentSection').style.display='none';
  showScreen('answer');
  document.getElementById('answerScroll').scrollTop=0;
}
function selectChild(idx){
  state.childAnswer=idx;
  state.currentQ.options.forEach((_,i)=>document.getElementById('cOpt'+i).classList.toggle('selected-child',i===idx));
  setTimeout(()=>{
    const ps=document.getElementById('parentSection');ps.style.display='';ps.classList.add('fade-in');
    document.getElementById('parentOptions').innerHTML=state.currentQ.options.map((o,i)=>`<button class="option-btn" onclick="selectParent(${i})" id="pOpt${i}">${o.t}</button>`).join('');
    setTimeout(()=>ps.scrollIntoView({behavior:'smooth',block:'start'}),100);
  },300);
}
function selectParent(idx){
  state.parentAnswer=idx;
  state.currentQ.options.forEach((_,i)=>document.getElementById('pOpt'+i).classList.toggle('selected-parent',i===idx));
  setTimeout(()=>showReveal(),500);
}
function skipQuestion(){if(state.currentQ)showDeck()}

// ═══ REVEAL SCREEN ═══
function showReveal(){
  const q=state.currentQ;const cat=categories.find(c=>c.id===q.cat);
  state.completed[q.id]={child:state.childAnswer,parent:state.parentAnswer};
  const cOpt=state.childAnswer!==null?q.options[state.childAnswer]:null;
  const pOpt=state.parentAnswer!==null?q.options[state.parentAnswer]:null;
  const same=state.childAnswer!==null&&state.parentAnswer!==null&&state.childAnswer===state.parentAnswer;
  let html=`<div class="reveal-q fade-in"><span class="q-cat-tag">${cat.emoji} ${cat.name}</span><div class="q-text" style="margin-top:8px">${q.q}</div></div>`;
  if(same) html+=`<div class="reveal-same fade-in">🎯 你们选了一样的答案！在这些方面你们可能有着相似的内心感受。</div>`;
  else if(state.childAnswer!==null&&state.parentAnswer!==null) html+=`<div class="reveal-diff fade-in">💭 你们选了不同的答案——太好了！这正好可以聊聊：为什么我们的想法不一样？</div>`;
  if(cOpt) html+=`<div class="reveal-section child-s fade-in"><h3>🧒 孩子的内心世界</h3><div class="reveal-answer">「${cOpt.t}」</div><div class="reveal-analysis">${cOpt.a}</div></div>`;
  if(pOpt) html+=`<div class="reveal-section parent-s fade-in"><h3>👨‍👩‍👧 家长的内心世界</h3><div class="reveal-answer">「${pOpt.t}」</div><div class="reveal-analysis">${pOpt.pa}</div></div>`;
  html+=`<div class="reveal-section relation-s fade-in"><h3>💬 一起聊聊</h3><div style="font-size:14px;line-height:1.8;color:#555">
看完两个人的心理解读后，可以聊聊：<br>
· 你选这个是因为什么呀？<br>
· 你觉得对方为什么会选那个？<br>
· 我们选的不一样的地方，你觉得有意思吗？<br>
<span style="color:var(--text-light);font-size:12px">💡 小贴士：没有对错之分，每个答案都是真实的自己。重点是了解彼此。</span></div></div>`;
  document.getElementById('revealScroll').innerHTML=html;
  showScreen('reveal');
  document.getElementById('revealScroll').scrollTop=0;
  if(same)spawnConfetti();
}
function backToDeck(){showScreen('deck');updateDeck()}

// ═══ PROGRESS ═══
function renderProgress(){
  const done=Object.keys(state.completed).length;
  let html=`<h2>📊 对话进度</h2><div class="text-center" style="margin-bottom:16px"><span style="font-size:24px;color:var(--coral)">${done}</span><span style="font-size:14px;color:var(--text-light)"> / 45 已完成</span></div>`;
  categories.forEach(c=>{const qs=questions.filter(q=>q.cat===c.id);const d=qs.filter(q=>state.completed[q.id]).length;html+=`<div class="cat-group"><div class="cat-group-title">${c.emoji} ${c.name} (${d}/${qs.length})</div><div class="cat-group-grid">`;qs.forEach(q=>{const ok=state.completed[q.id];html+=`<div class="q-dot ${ok?'completed':'pending'}" onclick="${ok?`reviewQ(${q.id})`:''}">${q.id}</div>`});html+=`</div></div>`});
  if(done>0) html+=`<div class="progress-footer"><button class="btn btn-ghost btn-small" onclick="resetProgress()">🔄 重新开始</button></div>`;
  document.getElementById('progressScroll').innerHTML=html;
}
function reviewQ(id){const e=state.completed[id];const q=questions.find(x=>x.id===id);state.currentQ=q;state.childAnswer=e.child;state.parentAnswer=e.parent;showReveal()}
function resetProgress(){if(confirm('确定要清除所有进度吗？')){state.completed={};renderProgress()}}

// ═══ CONFETTI ═══
function spawnConfetti(){const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);const colors=['#FF6B6B','#4ECDC4','#FFE66D','#A8D8EA','#FFD3B6','#FFAAA5'];for(let i=0;i<30;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*.8+'s';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p)}setTimeout(()=>c.remove(),3000)}

updateDeck();
</script>
